<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARRITO GAME</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Orbitron', monospace;
  }

  #wrapper {
    position: relative;
    display: inline-block;
  }

  canvas {
    display: block;
    background: #1a1a2e;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(0, 255, 200, 0.5);
    text-transform: uppercase;
  }

  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: #00ffc8;
    text-shadow: 0 0 15px rgba(0, 255, 200, 0.6);
    letter-spacing: 2px;
  }

  #level-badge {
    background: rgba(255, 60, 60, 0.15);
    border: 1px solid rgba(255, 60, 60, 0.4);
    padding: 6px 14px;
    border-radius: 4px;
    text-align: center;
  }

  #level-badge .stat-label { color: rgba(255, 100, 100, 0.7); }
  #level-badge .stat-value { font-size: 18px; color: #ff4444; text-shadow: 0 0 12px rgba(255, 60, 60, 0.7); }

  /* OVERLAY */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5, 5, 20, 0.92);
    backdrop-filter: blur(4px);
    z-index: 20;
    transition: opacity 0.3s;
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .overlay-title.start { color: #00ffc8; text-shadow: 0 0 30px rgba(0,255,200,0.5), 0 0 60px rgba(0,255,200,0.2); }
  .overlay-title.dead  { color: #ff4444; text-shadow: 0 0 30px rgba(255,60,60,0.6), 0 0 60px rgba(255,60,60,0.2); }

  .overlay-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .score-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: rgba(0,255,200,0.6);
    letter-spacing: 3px;
    margin-bottom: 10px;
  }

  .final-score {
    font-size: clamp(36px, 7vw, 72px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
    margin-bottom: 8px;
  }

  .best-score {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: rgba(255, 200, 0, 0.7);
    letter-spacing: 3px;
    margin-bottom: 50px;
  }

  .play-btn {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #0a0a0a;
    background: #00ffc8;
    border: none;
    padding: 16px 48px;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.15s;
    box-shadow: 0 0 30px rgba(0,255,200,0.3);
  }

  .play-btn:hover {
    background: #fff;
    box-shadow: 0 0 40px rgba(0,255,200,0.6);
    transform: translateY(-2px);
  }

  .play-btn:active { transform: translateY(0); }

  /* Mobile touch zones */
  #touch-zones {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 160px;
    display: none;
    z-index: 15;
    pointer-events: none;
  }

  @media (pointer: coarse) {
    #touch-zones { display: flex; }
  }

  .touch-zone {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: all;
    opacity: 0;
    transition: opacity 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .touch-zone:active { opacity: 0.12; background: rgba(0,255,200,0.3); }

  .touch-arrow {
    font-size: 40px;
    color: rgba(0,255,200,0.4);
  }

  /* Level-up flash */
  #levelup-flash {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    font-weight: 900;
    color: #ff4444;
    letter-spacing: 6px;
    text-shadow: 0 0 20px rgba(255,60,60,0.8);
    pointer-events: none;
    z-index: 30;
    opacity: 0;
    transition: none;
  }

  #levelup-flash.flash {
    animation: flashAnim 0.9s ease-out forwards;
  }

  @keyframes flashAnim {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    60%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -60%); }
  }
</style>
</head>
<body>

<div id="wrapper">
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="ui">
    <div class="stat">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score-display">0</div>
    </div>
    <div class="stat" id="level-badge">
      <div class="stat-label">Level</div>
      <div class="stat-value" id="level-display">1</div>
    </div>
    <div class="stat" style="text-align:right">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="best-display">0</div>
    </div>
  </div>

  <!-- Level up flash -->
  <div id="levelup-flash">LEVEL UP!</div>

  <!-- Start / Game Over overlay -->
  <div id="overlay">
    <div class="overlay-title start" id="overlay-title">CARRITO</div>
    <div class="overlay-sub" id="overlay-sub">dodge game</div>
    <div class="score-display" id="overlay-score-label" style="display:none">SCORE</div>
    <div class="final-score" id="overlay-score" style="display:none">0</div>
    <div class="best-score" id="overlay-best" style="display:none"></div>
    <button class="play-btn" id="play-btn">▶  JUGAR</button>
  </div>

  <!-- Mobile buttons -->
  <div id="touch-zones">
    <div class="touch-zone" id="touch-left">
      <span class="touch-arrow">◀</span>
    </div>
    <div class="touch-zone" id="touch-right">
      <span class="touch-arrow">▶</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Fit canvas nicely
const GAME_W = Math.min(420, window.innerWidth);
const GAME_H = Math.min(700, window.innerHeight);
canvas.width = GAME_W;
canvas.height = GAME_H;
document.getElementById("wrapper").style.width = GAME_W + "px";

// --- State ---
let state = "idle"; // idle | playing | dead
let score = 0;
let best = parseInt(localStorage.getItem("carrito_best") || "0");
let level = 1;
let frameCount = 0;
let spawnInterval = 90; // frames between spawns
let obstacleBaseSpeed = 4;

let player = {
  x: GAME_W / 2 - 18,
  y: GAME_H - 110,
  w: 36,
  h: 64,
  speed: 6,
  color: "#00ffc8"
};

let obstacles = [];
let particles = [];
let road = { stripeY: 0, stripeSpeed: 4 };
let keys = {};

// --- Input ---
document.addEventListener("keydown", e => {
  keys[e.key] = true;
  if (e.key === " " || e.key === "Enter") {
    if (state !== "playing") startGame();
  }
});
document.addEventListener("keyup", e => keys[e.key] = false);

// Touch drag
let touchX = null;
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  let touch = e.touches[0];
  let rect = canvas.getBoundingClientRect();
  touchX = touch.clientX - rect.left - player.w / 2;
}, { passive: false });
canvas.addEventListener("touchend", () => touchX = null);

// Touch left/right buttons
const touchLeft = document.getElementById("touch-left");
const touchRight = document.getElementById("touch-right");
let touchDir = 0;
touchLeft.addEventListener("touchstart", e => { e.preventDefault(); touchDir = -1; }, { passive: false });
touchRight.addEventListener("touchstart", e => { e.preventDefault(); touchDir = 1; }, { passive: false });
touchLeft.addEventListener("touchend", () => touchDir = 0);
touchRight.addEventListener("touchend", () => touchDir = 0);

document.getElementById("play-btn").addEventListener("click", startGame);

// --- Game Control ---
function startGame() {
  score = 0;
  level = 1;
  frameCount = 0;
  spawnInterval = 90;
  obstacleBaseSpeed = 4;
  obstacles = [];
  particles = [];
  player.x = GAME_W / 2 - player.w / 2;
  road.stripeY = 0;
  state = "playing";

  document.getElementById("overlay").classList.add("hidden");
  updateHUD();
}

function gameOver() {
  state = "dead";
  if (score > best) {
    best = score;
    localStorage.setItem("carrito_best", best);
  }

  // Spawn crash particles
  spawnCrash(player.x + player.w/2, player.y + player.h/2);

  // Show overlay
  const overlay = document.getElementById("overlay");
  overlay.classList.remove("hidden");
  document.getElementById("overlay-title").textContent = "PERDISTE";
  document.getElementById("overlay-title").className = "overlay-title dead";
  document.getElementById("overlay-sub").textContent = "intenta de nuevo";
  document.getElementById("play-btn").textContent = "↺  REINTENTAR";

  document.getElementById("overlay-score-label").style.display = "block";
  document.getElementById("overlay-score").style.display = "block";
  document.getElementById("overlay-score").textContent = score;
  document.getElementById("overlay-best").style.display = "block";
  document.getElementById("overlay-best").textContent = `MEJOR: ${best}`;
}

function updateHUD() {
  document.getElementById("score-display").textContent = score;
  document.getElementById("level-display").textContent = level;
  document.getElementById("best-display").textContent = best;
}

// --- Spawn ---
function spawnObstacle() {
  const lanes = [0.15, 0.38, 0.61, 0.84];
  const lane = lanes[Math.floor(Math.random() * lanes.length)];
  const speed = obstacleBaseSpeed + Math.random() * 2;

  const colors = ["#ff3333","#ff6600","#ff00aa","#cc00ff","#ff9900"];
  obstacles.push({
    x: GAME_W * lane - 18,
    y: -80,
    w: 36, h: 64,
    speed,
    color: colors[Math.floor(Math.random() * colors.length)],
    wobble: (Math.random() - 0.5) * 0.5
  });
}

// --- Particles ---
function spawnCrash(cx, cy) {
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      size: 3 + Math.random() * 5,
      color: ["#ff4444","#ff8800","#ffcc00","#fff"][Math.floor(Math.random()*4)]
    });
  }
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.025;
    p.vx *= 0.97;
  });
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// --- Drawing ---
function drawRoad() {
  // Base road
  ctx.fillStyle = "#16213e";
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Subtle side curbs
  const roadL = GAME_W * 0.06;
  const roadR = GAME_W * 0.94;

  ctx.fillStyle = "#1f3060";
  ctx.fillRect(0, 0, roadL, GAME_H);
  ctx.fillRect(roadR, 0, GAME_W - roadR, GAME_H);

  // Edge lines (neon glow)
  ctx.shadowBlur = 10;
  ctx.shadowColor = "rgba(0,255,200,0.4)";
  ctx.strokeStyle = "rgba(0,255,200,0.25)";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(roadL, 0); ctx.lineTo(roadL, GAME_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(roadR, 0); ctx.lineTo(roadR, GAME_H); ctx.stroke();
  ctx.shadowBlur = 0;

  // Dashed lane dividers
  road.stripeY = (road.stripeY + road.stripeSpeed) % 80;
  ctx.strokeStyle = "rgba(255,255,255,0.07)";
  ctx.lineWidth = 2;
  ctx.setLineDash([40, 40]);
  ctx.lineDashOffset = -road.stripeY;

  const laneXs = [GAME_W * 0.31, GAME_W * 0.54, GAME_W * 0.77];
  laneXs.forEach(lx => {
    ctx.beginPath();
    ctx.moveTo(lx, 0);
    ctx.lineTo(lx, GAME_H);
    ctx.stroke();
  });
  ctx.setLineDash([]);
}

function drawCar(x, y, w, h, bodyColor, isPlayer) {
  const r = 5;

  // Shadow
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.beginPath();
  ctx.ellipse(x + w/2, y + h + 4, w * 0.4, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body glow (neon trim)
  ctx.shadowBlur = isPlayer ? 20 : 12;
  ctx.shadowColor = bodyColor;

  // Body
  ctx.fillStyle = isPlayer ? "#111a2e" : "#1a0a0a";
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.fill();

  // Color stripe / roof
  ctx.fillStyle = bodyColor;
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  ctx.roundRect(x + 4, y + h * 0.18, w - 8, h * 0.42, 3);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Windshield
  ctx.fillStyle = "rgba(180, 240, 255, 0.18)";
  ctx.beginPath();
  ctx.roundRect(x + 6, y + h * 0.2, w - 12, h * 0.2, 2);
  ctx.fill();

  // Headlights (front = top for enemy, bottom for player)
  const lightY = isPlayer ? y + h - 12 : y + 6;
  ctx.fillStyle = isPlayer ? "#ffffaa" : "#ff5555";
  ctx.shadowColor = isPlayer ? "#ffff00" : "#ff0000";
  ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.ellipse(x + 6, lightY, 4, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + w - 6, lightY, 4, 3, 0, 0, Math.PI*2); ctx.fill();

  // Taillights
  const tailY = isPlayer ? y + 6 : y + h - 10;
  ctx.fillStyle = isPlayer ? "#ff3300" : "#aa0000";
  ctx.shadowColor = "#ff0000";
  ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.ellipse(x + 5, tailY, 3, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + w - 5, tailY, 3, 2, 0, 0, Math.PI*2); ctx.fill();

  ctx.shadowBlur = 0;
}

// --- Update ---
function update() {
  if (state !== "playing") return;

  frameCount++;
  score = Math.floor(frameCount / 3);

  // Level progression
  const newLevel = Math.floor(frameCount / 600) + 1;
  if (newLevel > level) {
    level = newLevel;
    obstacleBaseSpeed = 4 + (level - 1) * 0.8;
    spawnInterval = Math.max(40, 90 - (level - 1) * 10);
    road.stripeSpeed = 4 + (level - 1) * 0.5;
    showLevelUp();
  }

  // Player movement
  if (keys["ArrowLeft"] || keys["a"] || keys["A"]) player.x -= player.speed;
  if (keys["ArrowRight"] || keys["d"] || keys["D"]) player.x += player.speed;
  if (touchDir !== 0) player.x += touchDir * player.speed;
  if (touchX !== null) player.x = Math.max(0, Math.min(GAME_W - player.w, touchX));

  player.x = Math.max(GAME_W * 0.06, Math.min(GAME_W * 0.94 - player.w, player.x));

  // Spawn
  if (frameCount % spawnInterval === 0) spawnObstacle();

  // Move & collide obstacles
  obstacles.forEach(o => {
    o.y += o.speed;
    o.x += o.wobble;
  });

  // Collision
  for (const o of obstacles) {
    const margin = 6;
    if (
      player.x + margin < o.x + o.w - margin &&
      player.x + player.w - margin > o.x + margin &&
      player.y + margin < o.y + o.h - margin &&
      player.y + player.h - margin > o.y + margin
    ) {
      gameOver();
      return;
    }
  }

  obstacles = obstacles.filter(o => o.y < GAME_H + 100);

  // Road speed follows level
  road.stripeY = (road.stripeY + road.stripeSpeed) % 80;

  updateParticles();
  updateHUD();
}

function showLevelUp() {
  const el = document.getElementById("levelup-flash");
  el.textContent = `LEVEL ${level}`;
  el.classList.remove("flash");
  void el.offsetWidth;
  el.classList.add("flash");
}

function draw() {
  drawRoad();

  // Player
  drawCar(player.x, player.y, player.w, player.h, player.color, true);

  // Obstacles
  obstacles.forEach(o => drawCar(o.x, o.y, o.w, o.h, o.color, false));

  // Particles
  drawParticles();

  // Speed lines effect at high levels
  if (level >= 3 && state === "playing") {
    ctx.globalAlpha = 0.03 * (level - 2);
    ctx.strokeStyle = "#00ffc8";
    ctx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
      const sx = GAME_W * 0.1 + Math.random() * GAME_W * 0.8;
      ctx.beginPath();
      ctx.moveTo(sx, 0);
      ctx.lineTo(sx, GAME_H);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Update best on HUD initially
document.getElementById("best-display").textContent = best;

gameLoop();
</script>
</body>
</html>
